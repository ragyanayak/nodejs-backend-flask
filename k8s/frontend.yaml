apiVersion: apps/v1
kind: Deployment
metadata:
  name: poa-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poa-frontend
  template:
    metadata:
      labels:
        app: poa-frontend
    spec:
      containers:
      - name: poa-frontend
        image: docker.io/library/poa-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: poa-frontend-svc
spec:
  type: NodePort
  selector:
    app: poa-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30090
